version: '3.8'

services:
  evolution-api:
    container_name: evolution-api
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    networks:
      - n8n-automation_default
    environment:
      - SERVER_URL=https://ws.bigdata.net.co
      - AUTHENTICATION_API_KEY=BigData2025_SecureKey_1737071978
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://admin:BigData_Postgres_2025_Secure!@postgres-shared:5432/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://n8n:5678/webhook/whatsapp-pagos
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS=MESSAGES_UPSERT,SEND_MESSAGE,CONTACTS_UPSERT,GROUPS_UPSERT
      # Fix versión WhatsApp (QR Issue)
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1027934701
      # Stealth Mode
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=Windows 10 
      # Activar Swagger/Documentación
      - SWAGGER_ENABLED=true
      - DEL_INSTANCE=false
      - LOG_LEVEL=ERROR
      - LOG_COLOR=true
      # Redis Configuration
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX=evolution

    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution.rule=Host(`ws.bigdata.net.co`)"
      - "traefik.http.routers.evolution.entrypoints=websecure"
      - "traefik.http.routers.evolution.tls=true"
      - "traefik.http.routers.evolution.tls.certresolver=letsencrypt"
      - "traefik.http.services.evolution.loadbalancer.server.port=8080"

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - n8n-automation_default

volumes:
  evolution_instances:
  evolution_store:
  redis_data:

networks:
  n8n-automation_default:
    external: true
