#version: '3.8'
services:
  influxdb:
    image: influxdb:2
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword123  # ¡CAMBIA ESTO!
      - DOCKER_INFLUXDB_INIT_ORG=bigdata
      - DOCKER_INFLUXDB_INIT_BUCKET=energy
    restart: unless-stopped
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://n8n.bigdata.net.co:3000
      - GF_SERVER_DOMAIN=n8n.bigdata.net.co

    restart: unless-stopped
